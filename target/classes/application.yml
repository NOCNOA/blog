server:
  port: 8080

spring:
  application:
    name: blog
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: yijiayi12345

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.example.blog.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.example.blog.mapper: debug

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

blog:
  jwt:
    secret: blog-secret-key-change-me-blog-secret-key
    expire-hours: 24
  file:
    upload-dir: ${user.dir}/uploads
    access-path: /uploads/**
    access-url-prefix: /uploads/
