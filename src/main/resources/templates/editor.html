<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章编辑器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/editor.css?v=5">
</head>
<body class="editor-body">
<div class="editor-shell">
    <header class="editor-header">
        <div>
            <a href="/admin-ui" class="back-link">返回后台</a>
            <h1 id="editorTitle">新建文章</h1>
        </div>
        <div class="editor-header-actions">
            <button id="saveDraftButton" class="btn-secondary">保存草稿</button>
            <button id="publishButton" class="btn-primary">发布文章</button>
        </div>
    </header>

    <section class="editor-main">
        <article class="editor-block">
            <h2 class="block-label">标题</h2>
            <input id="titleInput" type="text" placeholder="输入文章标题" class="title-input">
        </article>

        <article class="editor-block">
            <h2 class="block-label">摘要</h2>
            <textarea id="summaryInput" rows="3" placeholder="输入文章摘要，简短概括文章内容" class="summary-input"></textarea>
        </article>

        <article class="editor-block editor-block-body">
            <div class="editor-head">
                <h2 class="block-label">正文</h2>
                <div class="editor-toolbar">
                    <button type="button" data-action="bold" title="加粗">B</button>
                    <button type="button" data-action="italic" title="斜体"><i>I</i></button>
                    <button type="button" data-action="heading" title="标题">H</button>
                    <button type="button" data-action="code" title="代码">&lt;/&gt;</button>
                    <button type="button" data-action="quote" title="引用">&quot;</button>
                    <button type="button" data-action="ul" title="无序列表">&bull;</button>
                    <button type="button" data-action="link" title="链接">🔗</button>
                    <button type="button" id="imageUploadBtn" title="上传图片">📷</button>
                    <button type="button" id="imageSizeBtn" title="设置图片大小">🖼️</button>
                    <span class="toolbar-sep"></span>
                    <label class="toolbar-label">字号</label>
                    <select id="fontSizeSelect" class="toolbar-select" title="字体大小">
                        <option value="">默认</option>
                        <option value="12">12px</option>
                        <option value="14">14px</option>
                        <option value="16">16px</option>
                        <option value="18">18px</option>
                        <option value="20">20px</option>
                        <option value="24">24px</option>
                        <option value="28">28px</option>
                        <option value="32">32px</option>
                    </select>
                    <span class="toolbar-sep"></span>
                    <button type="button" id="togglePreviewBtn" title="切换预览">预览</button>
                </div>
            </div>
            <div class="editor-area" id="editorArea">
                <textarea id="contentInput" placeholder="使用 Markdown 编写正文，支持拖拽或粘贴图片上传..."></textarea>
                <div id="previewPanel" class="preview-panel hidden"></div>
            </div>
        </article>
    </section>

    <aside class="editor-sidebar">
        <article class="sidebar-card">
            <h3 class="sidebar-label">分类</h3>
            <select id="categorySelect" class="sidebar-select"></select>
        </article>

        <article class="sidebar-card">
            <h3 class="sidebar-label">标签</h3>
            <div id="tagContainer" class="tag-container"></div>
            <input id="tagSearchInput" type="text" placeholder="搜索或输入标签名" class="tag-search-input">
        </article>

        <article class="sidebar-card">
            <h3 class="sidebar-label">封面图</h3>
            <div id="coverPreview" class="cover-preview"></div>
            <div class="cover-actions">
                <button id="uploadCoverButton" class="btn-secondary">上传封面</button>
                <button id="clearCoverButton" class="btn-ghost">清除</button>
            </div>
            <input id="coverUrlInput" type="text" placeholder="或输入封面图 URL" class="cover-url-input">
        </article>

        <article class="sidebar-card">
            <h3 class="sidebar-label">置顶</h3>
            <select id="topSelect" class="sidebar-select">
                <option value="0">否</option>
                <option value="1">是</option>
            </select>
        </article>

        <p id="editorMessage" class="editor-message"></p>
    </aside>
</div>

<div id="imageDialog" class="dialog-overlay hidden">
    <div class="dialog-card">
        <h3 class="dialog-title">设置图片大小</h3>
        <div class="dialog-form">
            <label class="dialog-label">图片地址<input id="imgUrlInput" type="text" placeholder="图片 URL" class="dialog-input"></label>
            <label class="dialog-label">描述文字<input id="imgAltInput" type="text" placeholder="图片描述（可选）" class="dialog-input"></label>
            <div class="dialog-row">
                <label class="dialog-label">宽度<input id="imgWidthInput" type="number" placeholder="如 600" class="dialog-input"></label>
                <label class="dialog-label">高度<input id="imgHeightInput" type="number" placeholder="如 400" class="dialog-input"></label>
            </div>
            <p class="dialog-hint">宽度或高度留空则自动按比例缩放，单位为 px</p>
        </div>
        <div class="dialog-actions">
            <button id="imgDialogCancel" class="btn-ghost">取消</button>
            <button id="imgDialogInsert" class="btn-primary">插入</button>
        </div>
    </div>
</div>

<form style="position:absolute;width:0;height:0;overflow:hidden;opacity:0;pointer-events:none;">
    <input type="file" id="imageFileInput" accept="image/png,image/jpeg,image/gif,image/bmp,image/webp">
</form>
<form style="position:absolute;width:0;height:0;overflow:hidden;opacity:0;pointer-events:none;">
    <input type="file" id="coverFileInput" accept="image/png,image/jpeg,image/gif,image/bmp,image/webp">
</form>

<script src="/assets/js/editor.js?v=5"></script>
</body>
</html>
