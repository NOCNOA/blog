<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/admin.css?v=5">
</head>
<body class="admin-body">
<div class="admin-shell">
    <section id="loginPanel" class="login-panel">
        <div class="login-card">
            <p class="eyebrow">Admin Console</p>
            <h1>登录后台</h1>
            <label>
                用户名
                <input id="usernameInput" type="text" value="admin" autocomplete="username">
            </label>
            <label>
                密码
                <input id="passwordInput" type="password" value="admin123" autocomplete="current-password">
            </label>
            <button id="loginButton" class="btn-primary">登录</button>
            <p id="loginMessage" class="hint"></p>
        </div>
    </section>

    <section id="dashboardPanel" class="dashboard hidden">
        <header class="dashboard-header">
            <div>
                <p class="eyebrow">Control Room</p>
                <h1>博客后台管理</h1>
                <p id="welcomeText" class="hint"></p>
            </div>
            <div class="dashboard-actions">
                <button id="refreshButton" class="btn-secondary">刷新数据</button>
                <button id="logoutButton" class="btn-ghost">退出登录</button>
            </div>
        </header>

        <section class="stats-grid">
            <article class="stat-card"><span>文章总数</span><strong id="articleCount">0</strong></article>
            <article class="stat-card"><span>已发布</span><strong id="publishedCount">0</strong></article>
            <article class="stat-card"><span>草稿</span><strong id="draftCount">0</strong></article>
            <article class="stat-card"><span>分类数</span><strong id="categoryCount">0</strong></article>
            <article class="stat-card"><span>标签数</span><strong id="tagCount">0</strong></article>
        </section>

        <section class="dashboard-grid">
            <article class="panel">
                <div class="panel-head">
                    <h2>站点配置</h2>
                    <button id="saveSiteButton" class="btn-primary">保存配置</button>
                </div>
                <div class="form-grid">
                    <label>站点名称<input id="siteNameInput" type="text"></label>
                    <label>站点描述<input id="siteDescriptionInput" type="text"></label>
                    <label>站点公告<input id="siteNoticeInput" type="text"></label>
                    <label>页脚信息<input id="footerInfoInput" type="text"></label>
                    <label>Logo 地址<input id="siteLogoInput" type="text"></label>
                    <label>头像地址<input id="avatarInput" type="text"></label>
                    <label>GitHub<input id="githubInput" type="text"></label>
                    <label>Gitee<input id="giteeInput" type="text"></label>
                </div>
                <p id="siteMessage" class="hint"></p>
            </article>

            <article class="panel">
                <div class="panel-head">
                    <h2 id="articleFormTitle">发布文章</h2>
                    <div class="inline-actions">
                        <a href="/admin-ui/editor" class="btn-primary">新建文章</a>
                        <button id="resetArticleButton" class="btn-secondary">清空表单</button>
                        <button id="saveArticleButton" class="btn-primary">保存文章</button>
                    </div>
                </div>
                <div class="form-grid">
                    <label class="full-span">文章标题<input id="articleTitleInput" type="text"></label>
                    <label class="full-span">文章摘要<input id="articleSummaryInput" type="text"></label>
                    <label>分类
                        <select id="articleCategorySelect"></select>
                    </label>
                    <label>状态
                        <select id="articleStatusSelect">
                            <option value="0">草稿</option>
                            <option value="1" selected>已发布</option>
                            <option value="2">已下线</option>
                        </select>
                    </label>
                    <label>是否置顶
                        <select id="articleTopSelect">
                            <option value="0" selected>否</option>
                            <option value="1">是</option>
                        </select>
                    </label>
                    <label>封面地址<input id="articleCoverInput" type="text"></label>
                    <label class="full-span">标签名称
                        <input id="articleTagsInput" type="text" placeholder="多个标签用英文逗号分隔，例如：Java,Spring Boot">
                    </label>
                    <label class="full-span">正文内容<textarea id="articleContentInput" rows="8"></textarea></label>
                </div>
                <p id="articleMessage" class="hint"></p>
            </article>

            <article class="panel">
                <div class="panel-head">
                    <h2>个人资料</h2>
                    <button id="saveProfileButton" class="btn-primary">保存资料</button>
                </div>
                <div class="form-grid">
                    <label>登录账号<input id="profileUsernameInput" type="text" readonly></label>
                    <label>用户昵称<input id="profileNicknameInput" type="text"></label>
                    <label>邮箱地址<input id="profileEmailInput" type="email"></label>
                    <label>头像地址<input id="profileAvatarInput" type="text"></label>
                </div>
                <p id="profileMessage" class="hint"></p>
            </article>

            <article class="panel">
                <div class="panel-head">
                    <h2>修改密码</h2>
                    <button id="savePasswordButton" class="btn-primary">更新密码</button>
                </div>
                <div class="form-grid">
                    <label>原密码<input id="oldPasswordInput" type="password" autocomplete="current-password"></label>
                    <label>新密码<input id="newPasswordInput" type="password" autocomplete="new-password"></label>
                </div>
                <p id="passwordMessage" class="hint"></p>
            </article>

            <article class="panel">
                <div class="panel-head">
                    <h2>图片上传</h2>
                    <button id="uploadButton" class="btn-primary">上传图片</button>
                </div>
                <div class="form-grid single-grid">
                    <label>选择图片文件<input id="uploadFileInput" type="file" accept="image/*"></label>
                    <label>上传结果地址<input id="uploadResultInput" type="text" readonly></label>
                </div>
                <div class="quick-fill">
                    <button id="fillCoverButton" class="btn-secondary">填入封面</button>
                    <button id="fillLogoButton" class="btn-secondary">填入 Logo</button>
                    <button id="fillAvatarButton" class="btn-secondary">填入头像</button>
                    <button id="fillProfileAvatarButton" class="btn-secondary">填入资料头像</button>
                </div>
                <p id="uploadMessage" class="hint"></p>
            </article>

            <article class="panel">
                <div class="panel-head">
                    <h2>分类管理</h2>
                    <button id="saveCategoryButton" class="btn-primary">新增分类</button>
                </div>
                <div class="form-grid">
                    <label>分类名称<input id="categoryNameInput" type="text"></label>
                    <label>排序<input id="categorySortInput" type="number" value="1"></label>
                    <label class="full-span">分类描述<input id="categoryDescriptionInput" type="text"></label>
                </div>
                <p id="categoryMessage" class="hint"></p>
                <div id="categoryTable" class="table-list compact"></div>
            </article>

            <article class="panel">
                <div class="panel-head">
                    <h2>标签管理</h2>
                    <button id="saveTagButton" class="btn-primary">新增标签</button>
                </div>
                <div class="form-grid single-grid">
                    <label>标签名称<input id="tagNameInput" type="text"></label>
                </div>
                <p id="tagMessage" class="hint"></p>
                <div id="tagTable" class="table-list compact"></div>
            </article>

            <article class="panel full-width">
                <div class="panel-head panel-head-stack">
                    <div>
                        <h2>文章列表</h2>
                        <span class="hint">可直接筛选、编辑、下线或删除文章。</span>
                    </div>
                    <div class="filter-bar">
                        <input id="articleKeywordFilterInput" type="text" placeholder="搜索标题或摘要">
                        <select id="articleCategoryFilterSelect"></select>
                        <select id="articleStatusFilterSelect">
                            <option value="">全部状态</option>
                            <option value="0">草稿</option>
                            <option value="1">已发布</option>
                            <option value="2">已下线</option>
                        </select>
                        <button id="articleSearchButton" class="btn-secondary">筛选</button>
                        <button id="articleFilterResetButton" class="btn-ghost">重置</button>
                    </div>
                </div>
                <div id="articleTable" class="table-list"></div>
            </article>
        </section>
    </section>
</div>

<script src="/assets/js/admin.js?v=5"></script>
</body>
</html>
