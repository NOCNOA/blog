<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/site.css?v=5">
</head>
<body class="site-body" th:attr="data-article-id=${articleId}">
<div class="site-shell">
    <header class="hero hero-compact">
        <div class="hero-backdrop"></div>
        <nav class="topbar">
            <a class="brand brand-link" href="/">
                <span id="siteLogoMark" class="brand-mark">B</span>
                <span id="siteName">博客加载中</span>
            </a>
            <div class="topbar-links">
                <a href="/">首页</a>
                <a href="/#archive">归档</a>
                <a href="/admin-ui">后台</a>
            </div>
        </nav>
    </header>

    <main class="detail-layout">
        <article class="content-panel detail-panel">
            <a class="back-link" href="/">← 返回首页</a>
            <p id="detailMeta" class="detail-meta">正在加载文章...</p>
            <h1 id="detailTitle" class="detail-title">文章详情</h1>
            <p id="detailSummary" class="detail-summary"></p>
            <div id="detailTags" class="chip-list"></div>
            <div id="detailCover" class="detail-cover hidden"></div>
            <div id="detailContent" class="detail-content"></div>
        </article>

        <aside class="sidebar">
            <section class="card">
                <h3>站点信息</h3>
                <div class="site-meta">
                    <p id="siteNotice" class="hero-note-dark">加载中...</p>
                    <p id="footerInfo">加载中...</p>
                    <a id="githubUrl" href="#" target="_blank" rel="noreferrer">GitHub</a>
                    <a id="giteeUrl" href="#" target="_blank" rel="noreferrer">Gitee</a>
                </div>
            </section>
            <section class="card">
                <h3>更多文章</h3>
                <div id="moreArticleList" class="archive-list"></div>
            </section>
        </aside>
    </main>

    <footer class="footer">
        <span id="footerText">Blog</span>
    </footer>
</div>

<script src="/assets/js/article-detail.js?v=5"></script>
</body>
</html>
