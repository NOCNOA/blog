services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-app
    ports:
      - "8080:8080"
    networks:
      - shared
    environment:
      DB_URL: jdbc:mysql://1Panel-mysql-O0OE:3306/blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_HOURS: "24"
    restart: unless-stopped

networks:
  shared:
    external: true
